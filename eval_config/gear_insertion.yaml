# GUMI Multimodal Inference Configuration

# Camera settings
camera:
  main_camera:
    name: 'wrist_1'
    serial_number: '241122306040'
    resolution: [1280, 800]
    fps: 30
  additional_camera:
    name: 'additional_camera'
    serial_number: '427622273372'
    resolution: [640, 480]
    fps: 30

# Robot settings
robot:
  server_ip: '172.27.190.125'
  server_port: 4999
  initial_pose: [0.48, -0.02, 0.14, 1.0, 0.0, 0.0, 0.0]  # [x, y, z, qw, qx, qy, qz]
  random_pos_range: 0.02
  max_pos_speed: 0.7  # m/s
  max_rot_speed: 0.7  # rad/s
  initial_tilt_axis: 'y'
  initial_tilt_deg: 0.0

# Control parameters
control:
  frequency: 200.0  # Hz
  command_latency: 0.02  # seconds
  action_exec_latency: 0.02  # seconds

# Image processing
image:
  history_length: 2  # IMG_HIST
  target_resolution: [256, 256]  # [width, height]

# Action processing
action:
  position_xy_scale: 2 # image only 0.5, lowdim 0.1
  position_z_scale: 2 # image only 0.5, lowdim 0.1
  rotation_xy_scale: 2  # X,Y axis rotation scaling
  rotation_z_scale: 2 # Z axis rotation scaling


# FT sensor settings
ft_sensor:
  rate_hz: 200.0
  buffer_length: 100  # FT_RING_LEN
  obs_horizon: 8  # FT_OBS_HORIZON
  # low freq FT
  # obs_horizon: 3
  calibration_samples: 200

# Gravity compensator (mass/com and constants)
gravity_compensator:
  mass_for_x: 0.73
  mass_for_y: 0.73
  mass_for_z: 0.73
  com_ft: [0.0, 0.01, 0.03]
  g_const: 9.81
  warmup_sec: 5.0

# Gripper control
gripper:
  history_length: 5
  close_threshold: 0.2 
  open_threshold: 0.9 
  close_count_threshold: 3  
  open_count_threshold: 4
  http_port: 5000

# Model settings
model:
  num_inference_steps: 16  # DDIM inference iterations

# Coordinate transformation matrix
coordinate_transform:
  R_mat_pos : [
          [0, 1, 0],
          [1, 0, 0],
          [0, 0, -1]
  ]

  R_mat_rot : [
          [0, 1, 0],
          [-1, 0, 0],
          [0, 0, 1]
  ]


# Visualization
visualization:
  camera_index: 0

# File paths (will be overridden by command line arguments)
paths:
  output_video: 'output.mp4'
  
  # Specify the path to your trained model checkpoint (.ckpt)
  # Example: "checkpoints/your_model.ckpt"
  model_checkpoint: null
