  # baseline
  model_checkpoint: "/media/ailab-2204/research/vc_umi/complete/lanport/baseline_dv3_mv3-256x256-p768-img-only_frozen-dinov2-B_transformer-dp_ods2_lanport/checkpoints/epoch=0499-val_action_error=0.00003.ckpt"

