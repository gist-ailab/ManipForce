defaults:
  - task: manipforce
  - _self_

name: manipforce_ods2_256x256
_target_: diffusion_policy.workspace.train_manipforce_workspace.TrainManipForceWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "default"

n_action_steps: 8
proj_dim: 768

task:
  obs_down_sample_steps: 2

policy:
  _target_: diffusion_policy.policy.diffusion_transformer_timm_policy.DiffusionTransformerTimmPolicy

  shape_meta: ${shape_meta}
  
  noise_scheduler:
    _target_: diffusers.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    # beta_schedule is important
    # this is the best we found
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: epsilon # or sample

  obs_encoder:
    _target_: diffusion_policy.model.vision.fmt_obs_encoder.FMTObsEncoder
    shape_meta: ${shape_meta}

    model_name: 'dino_vitb16'
    pretrained: True
    load_from: 'checkpoints/dinov2_vitb16_256x256_pretrain_split_qkv.pth'
    frozen: True
    
    global_pool: ''
    downsample_ratio: 16

    transforms:
      - type: RandomCrop
        ratio: 0.95
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.3
        contrast: 0.4
        saturation: 0.5
        hue: 0.08

    imagenet_norm: True
    share_rgb_model: True

    use_cls_token: False
    use_spatial_embed: True
    use_temporal_embed: True
    use_modal_embed: True
    use_attn_pool: False

    proj_dim: ${proj_dim}

    use_ft_ncde: False
    ft_ncde_hidden_dim: 512
    ft_key: ft_data
    ft_timestamp_key: ft_timestamps
    
    use_cross_attention: True
    cross_attention_type: 'parallel'
    cross_attention_modals: ['img', 'ft']
    cross_attention_num_heads: 12

  num_inference_steps: 16
  input_pertub: 0.1
  n_layer: 7
  n_head: 8
  n_emb: ${proj_dim}
  p_drop_attn: 0.1

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: True

val_dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: True

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: False
  # optimization
  lr_scheduler: cosine
  lr_warmup_steps: 500  # 500 (base) * 1 (n_gpus)
  num_epochs: 500
  gradient_accumulate_every: 1
  # EMA destroys performance when used with BatchNorm
  # replace BatchNorm with GroupNorm.
  use_ema: True
  freeze_encoder: False
  # training loop control
  # in epochs
  rollout_every: 10
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  # steps per epoch
  max_train_steps: null
  max_val_steps: null
  # misc
  tqdm_interval_sec: 1.0

logging:
  project: ManipForce
  resume: False
  mode: online
  name: custom
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: val_action_mse_error
    mode: min
    k: 20
    format_str: 'epoch={epoch:04d}-val_action_error={val_action_mse_error:.5f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: outputs
  wandb_name_base: ${name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: outputs
  sweep:
    dir: outputs
    subdir: ${hydra.job.num}
